name: CNPJ ETL

on:
  schedule:
    # A cada hora, no minuto 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      competence:
        description: "Competência YYYY-MM (vazio = mais recente)"
        required: false
        type: string
      force:
        description: "Reprocessar arquivos já concluídos"
        required: false
        type: boolean
        default: false

concurrency:
  group: cnpj-etl
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate DATABASE_URL secret
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::Secret DATABASE_URL ausente. Configure em Settings → Secrets and variables → Actions."
            exit 1
          fi
          case "$DATABASE_URL" in
            *localhost*|*127.0.0.1*)
              echo "::error::DATABASE_URL aponta para localhost. Use a URL do Supabase (pooler, porta 5432)."
              exit 1
              ;;
            *supabase.co*)
              echo "DATABASE_URL configurado (Supabase)."
              ;;
            *)
              echo "DATABASE_URL configurado."
              ;;
          esac

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install .

      - name: Check database connection
        run: python -m cnpj_etl.cli check-db

      - name: Run ETL
        env:
          KEEP_DOWNLOADS: "false"
        run: |
          args="--auto"
          if [ -n "${{ inputs.competence }}" ]; then
            args="$args --competence ${{ inputs.competence }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            args="$args --force"
          fi
          python -m cnpj_etl.cli run $args
