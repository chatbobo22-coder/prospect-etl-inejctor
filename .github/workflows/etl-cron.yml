name: CNPJ ETL

on:
  schedule:
    # A cada hora, no minuto 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      competence:
        description: "Competência YYYY-MM (vazio = mais recente)"
        required: false
        type: string
      force:
        description: "Reprocessar arquivos já concluídos"
        required: false
        type: boolean
        default: false

concurrency:
  group: cnpj-etl
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load DATABASE_URL
        env:
          SECRET_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VAR_DATABASE_URL: ${{ vars.DATABASE_URL }}
        run: |
          if [ -n "${SECRET_DATABASE_URL:-}" ]; then
            echo "DATABASE_URL=${SECRET_DATABASE_URL}" >> "$GITHUB_ENV"
            echo "Repository secret DATABASE_URL OK."
          elif [ -n "${VAR_DATABASE_URL:-}" ]; then
            echo "DATABASE_URL=${VAR_DATABASE_URL}" >> "$GITHUB_ENV"
            echo "Repository variable DATABASE_URL OK."
          else
            echo "::error::DATABASE_URL não encontrado em Repository secrets/variables."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install .

      - name: Configure ETL filters
        run: |
          DEFAULT_CNAES="4530703,4744099,4751201,4752100,4753900,4754701,4755503,4759899,4763601,4763602,4772500,4781400,4782201,4782202,4783101,4783102,4789001,4791201"
          echo "FILTER_ACTIVE_ONLY=true" >> "$GITHUB_ENV"
          echo "FILTER_REQUIRE_NOME_FANTASIA=true" >> "$GITHUB_ENV"
          echo "FILTER_REQUIRE_TELEFONE=true" >> "$GITHUB_ENV"
          echo "FILTER_MIN_POPULATION=100000" >> "$GITHUB_ENV"
          echo "IBGE_POPULATION_YEAR=2024" >> "$GITHUB_ENV"
          echo "FILTER_CNAE_INCLUDE_SECONDARY=false" >> "$GITHUB_ENV"
          if [ -n "${{ vars.FILTER_CNAES }}" ]; then
            echo "FILTER_CNAES=${{ vars.FILTER_CNAES }}" >> "$GITHUB_ENV"
          else
            echo "FILTER_CNAES=$DEFAULT_CNAES" >> "$GITHUB_ENV"
          fi
          # Carga nacional — não aplicar FILTER_UF mesmo se existir nos variables do GitHub

      - name: Check database connection
        run: python -m cnpj_etl.cli check-db

      - name: Migrate and sync IBGE population
        run: python -m cnpj_etl.cli sync-ibge

      - name: Verify filters
        run: python -m cnpj_etl.cli verify-filters

      - name: Run ETL
        env:
          KEEP_DOWNLOADS: "false"
        run: |
          args="--auto"
          if [ -n "${{ inputs.competence }}" ]; then
            args="$args --competence ${{ inputs.competence }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            args="$args --force"
          fi
          python -m cnpj_etl.cli run $args
