name: CNPJ ETL

on:
  schedule:
    # A cada hora, no minuto 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      competence:
        description: "Competência YYYY-MM (vazio = mais recente)"
        required: false
        type: string
      force:
        description: "Reprocessar arquivos já concluídos"
        required: false
        type: boolean
        default: false

concurrency:
  group: cnpj-etl
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load DATABASE_URL
        env:
          SECRET_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VAR_DATABASE_URL: ${{ vars.DATABASE_URL }}
        run: |
          if [ -n "${SECRET_DATABASE_URL:-}" ]; then
            echo "DATABASE_URL=${SECRET_DATABASE_URL}" >> "$GITHUB_ENV"
            echo "Repository secret DATABASE_URL OK."
          elif [ -n "${VAR_DATABASE_URL:-}" ]; then
            echo "DATABASE_URL=${VAR_DATABASE_URL}" >> "$GITHUB_ENV"
            echo "Repository variable DATABASE_URL OK."
          else
            echo "::error::DATABASE_URL não encontrado."
            echo "::error::Vá em Settings → Secrets and variables → Actions (NÃO Environments)."
            echo "::error::Aba Repository secrets → New repository secret → Name: DATABASE_URL"
            echo "::error::Link: https://github.com/chatbobo22-coder/prospect-etl-inejctor/settings/secrets/actions"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install .

      - name: Check database connection
        run: python -m cnpj_etl.cli check-db

      - name: Run ETL
        env:
          KEEP_DOWNLOADS: "false"
        run: |
          args="--auto"
          if [ -n "${{ inputs.competence }}" ]; then
            args="$args --competence ${{ inputs.competence }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            args="$args --force"
          fi
          python -m cnpj_etl.cli run $args
