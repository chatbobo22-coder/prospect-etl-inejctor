name: CNPJ ETL

on:
  schedule:
    # A cada hora, no minuto 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      competence:
        description: "Competência YYYY-MM (vazio = mais recente)"
        required: false
        type: string
      force:
        description: "Reprocessar arquivos já concluídos"
        required: false
        type: boolean
        default: false

concurrency:
  group: cnpj-etl
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    # Usa o environment "production" onde você configurou DATABASE_URL.
    # Se o nome do seu environment for outro, troque aqui.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load DATABASE_URL from secrets
        env:
          SECRET_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VAR_DATABASE_URL: ${{ vars.DATABASE_URL }}
          SECRET_POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          SECRET_POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
        run: |
          if [ -n "${SECRET_DATABASE_URL:-}" ]; then
            echo "DATABASE_URL=${SECRET_DATABASE_URL}" >> "$GITHUB_ENV"
            echo "Secret DATABASE_URL encontrado."
          elif [ -n "${VAR_DATABASE_URL:-}" ]; then
            echo "DATABASE_URL=${VAR_DATABASE_URL}" >> "$GITHUB_ENV"
            echo "Variable DATABASE_URL encontrada."
          elif [ -n "${SECRET_POSTGRES_URL_NON_POOLING:-}" ]; then
            echo "DATABASE_URL=${SECRET_POSTGRES_URL_NON_POOLING}" >> "$GITHUB_ENV"
            echo "Secret POSTGRES_URL_NON_POOLING encontrado."
          elif [ -n "${SECRET_POSTGRES_URL:-}" ]; then
            echo "DATABASE_URL=${SECRET_POSTGRES_URL}" >> "$GITHUB_ENV"
            echo "Secret POSTGRES_URL encontrado."
          else
            echo "::error::Nenhum secret/variable de banco encontrado."
            echo "::error::Opção A (mais simples): Repository secrets em"
            echo "::error::  https://github.com/chatbobo22-coder/prospect-etl-inejctor/settings/secrets/actions"
            echo "::error::Opção B: Environment secrets/variables no environment 'production'"
            exit 1
          fi
          case "${DATABASE_URL:-}" in
            *localhost*|*127.0.0.1*)
              echo "::error::URL aponta para localhost. Use o Supabase (pooler, porta 5432)."
              exit 1
              ;;
          esac

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install .

      - name: Check database connection
        run: python -m cnpj_etl.cli check-db

      - name: Run ETL
        env:
          KEEP_DOWNLOADS: "false"
        run: |
          args="--auto"
          if [ -n "${{ inputs.competence }}" ]; then
            args="$args --competence ${{ inputs.competence }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            args="$args --force"
          fi
          python -m cnpj_etl.cli run $args
